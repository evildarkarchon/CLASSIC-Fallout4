name: CI — TypeScript

on:
  push:
    branches: [main, classic-next, develop, classic-9]
  pull_request:
    branches: [main, classic-next, develop, classic-9]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  parity-gates:
    name: Node Parity Gates
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      RUST_BACKTRACE: full
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: ClassicLib-rs/target
          key: ${{ runner.os }}-cargo-node-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('ClassicLib-rs/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-node-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-node-

      - name: Install npm dependencies
        working-directory: ClassicLib-rs/node-bindings/classic-node
        run: bun install

      - name: Build NAPI-RS binary
        working-directory: ClassicLib-rs/node-bindings/classic-node
        run: bun run build

      - name: Verify NAPI binary exists
        working-directory: ClassicLib-rs/node-bindings/classic-node
        shell: pwsh
        run: |
          $binary = Get-ChildItem -Filter "*.node" -Recurse
          if ($binary) {
            Write-Host "NAPI binary found: $($binary.FullName) ($([math]::Round($binary.Length / 1MB, 2)) MB)"
          } else {
            Write-Error "NAPI binary not found after build"
            exit 1
          }

      - name: Run Tier-1 parity and runtime coverage gate
        working-directory: ClassicLib-rs/node-bindings/classic-node
        run: bun run parity:gate

      - name: Run index.d.ts freshness gate
        working-directory: ClassicLib-rs/node-bindings/classic-node
        run: bun run dts:freshness:check

      - name: Upload parity and runtime coverage diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: node-parity-diagnostics
          path: ClassicLib-rs/node-bindings/classic-node/parity-artifacts/
          if-no-files-found: warn
          retention-days: 7

  build-and-test:
    name: NAPI-RS Build + Runtime Tests (${{ matrix.runtime }})
    needs: [parity-gates]
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        runtime: [bun, node]
    env:
      RUST_BACKTRACE: full
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: ClassicLib-rs/target
          key: ${{ runner.os }}-cargo-node-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('ClassicLib-rs/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-node-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-node-

      - name: Install npm dependencies
        working-directory: ClassicLib-rs/node-bindings/classic-node
        run: bun install

      - name: Build NAPI-RS binary
        working-directory: ClassicLib-rs/node-bindings/classic-node
        run: bun run build

      - name: Verify NAPI binary exists
        working-directory: ClassicLib-rs/node-bindings/classic-node
        shell: pwsh
        run: |
          $binary = Get-ChildItem -Filter "*.node" -Recurse
          if ($binary) {
            Write-Host "NAPI binary found: $($binary.FullName) ($([math]::Round($binary.Length / 1MB, 2)) MB)"
          } else {
            Write-Error "NAPI binary not found after build"
            exit 1
          }

      - name: Run Bun tests
        if: matrix.runtime == 'bun'
        working-directory: ClassicLib-rs/node-bindings/classic-node
        run: bun run test:bun

      - name: Run Node runtime smoke tests
        if: matrix.runtime == 'node'
        working-directory: ClassicLib-rs/node-bindings/classic-node
        run: bun run test:node
