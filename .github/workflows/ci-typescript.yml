name: CI — TypeScript

on:
  push:
    branches: [main, classic-next, develop, classic-9]
  pull_request:
    branches: [main, classic-next, develop, classic-9]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: NAPI-RS Build + Bun Tests
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      RUST_BACKTRACE: full
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: ClassicLib-rs/target
          key: ${{ runner.os }}-cargo-node-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('ClassicLib-rs/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-node-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-node-

      - name: Install npm dependencies
        working-directory: ClassicLib-rs/node-bindings/classic-node
        run: bun install

      - name: Build NAPI-RS binary
        working-directory: ClassicLib-rs/node-bindings/classic-node
        run: bun run build

      - name: Verify NAPI binary exists
        working-directory: ClassicLib-rs/node-bindings/classic-node
        shell: pwsh
        run: |
          $binary = Get-ChildItem -Filter "*.node" -Recurse
          if ($binary) {
            Write-Host "NAPI binary found: $($binary.FullName) ($([math]::Round($binary.Length / 1MB, 2)) MB)"
          } else {
            Write-Error "NAPI binary not found after build"
            exit 1
          }

      - name: Run Bun tests
        working-directory: ClassicLib-rs/node-bindings/classic-node
        run: bun test
