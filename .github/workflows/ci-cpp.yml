name: CI - C++

on:
  push:
    branches: [classic-next]
  pull_request:
    branches: [classic-next]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  cxx-parity-gate:
    name: Binding Compliance Gate (C++)
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run CXX binding compliance profile
        run: python tools/binding_compliance/check_compliance.py --repo-root . --profile cxx-ci

      - name: Upload CXX binding compliance diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cxx-parity-diagnostics
          path: |
            tools/binding_compliance/artifacts/
            cpp-bindings/classic-cpp-bridge/parity-artifacts/
          if-no-files-found: warn
          retention-days: 7

  cli-tests:
    name: CLI Tests (${{ matrix.compiler }})
    needs: [cxx-parity-gate]
    runs-on: windows-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        compiler: [msvc, clang-cl]
    env:
      RUST_BACKTRACE: full
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.compiler }}-cargo-cpp-cli-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('foundation/**/*.rs', 'business-logic/**/*.rs', 'cpp-bindings/**/*.rs', 'node-bindings/**/*.rs', 'python-bindings/**/*.rs', 'ui-applications/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.compiler }}-cargo-cpp-cli-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-${{ matrix.compiler }}-cargo-cpp-cli-

      - name: Cache vcpkg root
        uses: actions/cache@v5
        with:
          path: ~\vcpkg
          key: ${{ runner.os }}-${{ matrix.compiler }}-vcpkg-root-${{ hashFiles('.github/scripts/setup-vcpkg.ps1', 'classic-cli/vcpkg.json', 'classic-gui/vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.compiler }}-vcpkg-root-

      - name: Set up vcpkg (resilient)
        shell: pwsh
        run: pwsh -ExecutionPolicy Bypass -File .github/scripts/setup-vcpkg.ps1

      - name: Build and test CLI
        run: pwsh -ExecutionPolicy Bypass -File classic-cli/build_cli.ps1 -Test -Compiler ${{ matrix.compiler }}

      - name: Upload CLI diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cli-test-diagnostics-${{ matrix.compiler }}
          path: |
            classic-cli/build*/Testing/
            classic-cli/build*/CMakeFiles/CMake*.log
            classic-cli/build*/CMakeFiles/CMakeConfigureLog.yaml
            classic-cli/build*/vcpkg*.log
            classic-cli/build*/**/vcpkg*.log
          if-no-files-found: warn
          retention-days: 7

  gui-tests:
    name: GUI Tests (${{ matrix.compiler }})
    needs: [cxx-parity-gate]
    runs-on: windows-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        compiler: [msvc, clang-cl]
    env:
      RUST_BACKTRACE: full
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.compiler }}-cargo-cpp-gui-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('foundation/**/*.rs', 'business-logic/**/*.rs', 'cpp-bindings/**/*.rs', 'node-bindings/**/*.rs', 'python-bindings/**/*.rs', 'ui-applications/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.compiler }}-cargo-cpp-gui-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-${{ matrix.compiler }}-cargo-cpp-gui-

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.0"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          archives: qtbase
          cache: true
          cache-key-prefix: classic-gui-qt

      - name: Configure Qt CMake path
        shell: pwsh
        run: |
          if (-not $env:QT_ROOT_DIR) {
            throw "QT_ROOT_DIR was not set by install-qt-action."
          }
          $prefixes = @($env:QT_ROOT_DIR)
          if ($env:CMAKE_PREFIX_PATH) {
            $prefixes += $env:CMAKE_PREFIX_PATH
          }
          "CMAKE_PREFIX_PATH=$($prefixes -join ';')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: GUI test preflight diagnostics
        shell: pwsh
        run: |
          cmake --version
          ctest --version
          Write-Host "QT_QPA_PLATFORM=$env:QT_QPA_PLATFORM"
          Write-Host "QT_ROOT_DIR=$env:QT_ROOT_DIR"
          Write-Host "Qt6_DIR=$env:Qt6_DIR"
          Write-Host "CMAKE_PREFIX_PATH=$env:CMAKE_PREFIX_PATH"

      - name: Verify Qt resolution policy
        shell: pwsh
        run: pwsh -ExecutionPolicy Bypass -File classic-gui/verify_qt_resolution.ps1

      - name: Build and test GUI
        run: pwsh -ExecutionPolicy Bypass -File classic-gui/build_gui.ps1 -Preset ci-system-qt -Test -TestTimeoutSec 600 -Compiler ${{ matrix.compiler }}

      - name: Upload GUI diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: gui-test-diagnostics-${{ matrix.compiler }}
          path: |
            classic-gui/build*/Testing/
            classic-gui/build-qt-policy-check/
            classic-gui/build*/CMakeFiles/CMake*.log
            classic-gui/build*/CMakeFiles/CMakeConfigureLog.yaml
            classic-gui/build*/vcpkg*.log
            classic-gui/build*/**/vcpkg*.log
          if-no-files-found: warn
          retention-days: 7
