name: CI

on:
  push:
    branches: [main, classic-next, develop, getting-rusty]
  pull_request:
    branches: [main, classic-next, develop, getting-rusty]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  # Python version must match project requirements
  PYTHON_VERSION: "3.12"
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # Formatting checks (non-blocking, aesthetic only)
  format-python:
    name: Python Formatting (Ruff)
    runs-on: windows-latest
    timeout-minutes: 10
    continue-on-error: true # Don't block CI on formatting issues
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff format check
        run: uv run ruff format --check .

  format-rust:
    name: Rust Formatting (rustfmt)
    runs-on: windows-latest
    timeout-minutes: 10
    continue-on-error: true # Don't block CI on formatting issues
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Run rustfmt check
        run: cargo fmt --all --manifest-path rust/Cargo.toml -- --check

  # Linting checks (can catch real bugs, run in parallel with builds)
  lint-python:
    name: Python Linting (Ruff)
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff check
        run: uv run ruff check .

  dead-code:
    name: Dead Code Detection (Vulture)
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run vulture dead code detection
        run: uv run vulture ClassicLib/ vulture_whitelist.py --min-confidence 80

  lint-rust:
    name: Rust Linting (Clippy)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: rust/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('rust/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-build-

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features --manifest-path rust/Cargo.toml -- -D warnings

  # Build Rust components (no dependencies - runs immediately)
  build-rust:
    name: Build Rust Components
    runs-on: windows-latest
    timeout-minutes: 60 # Prevent build from hanging
    env:
      RUST_BACKTRACE: full
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: rust/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('rust/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-build-

      - name: Build all Rust workspace
        run: cargo build --workspace --release --manifest-path rust/Cargo.toml

      - name: Upload Rust build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-libs
          path: |
            rust/target/release/*.dll
            rust/target/release/*.pdb
          retention-days: 1

  # Run Rust tests (independent of Python tests)
  test-rust:
    name: Rust Tests
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      RUST_BACKTRACE: full
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: rust/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('rust/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-test-

      - name: Run Rust tests
        run: cargo test --workspace --release --manifest-path rust/Cargo.toml -- --nocapture

      - name: Run Rust tests with all features
        run: cargo test --workspace --release --all-features --manifest-path rust/Cargo.toml -- --nocapture

  # Build Python bindings with maturin
  build-python-bindings:
    name: Build Python Bindings
    runs-on: windows-latest
    needs: [build-rust] # Only wait for Rust build, not linting
    timeout-minutes: 30 # Maturin builds can be slow
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: rust/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('rust/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-build-

      - name: Install maturin
        run: uv tool install maturin

      - name: Build all Python bindings
        run: ./rebuild_rust.ps1 -BuildOnly
        shell: pwsh

      - name: Upload Python binding wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels
          path: |
            rust/python-bindings/*/dist/*.whl
            rust/foundation/*/dist/*.whl
          retention-days: 1

  # Run Python tests
  test-python:
    name: Python Tests
    runs-on: windows-latest
    needs: [build-python-bindings]
    timeout-minutes: 30 # Kill job if tests hang for 30 minutes
    env:
      PYTHONTRACEMALLOC: "10" # Enable tracemalloc with 10 frame depth for better error reporting
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Download Python binding wheels
        uses: actions/download-artifact@v4
        with:
          name: python-wheels
          path: wheels

      - name: Install Python dependencies and wheels
        run: |
          uv sync --all-extras
          # Debug: Show workflow version
          Write-Host "CI workflow version: 2024-11-27-v6"
          # Install pip into the venv so we can use it directly
          uv pip install pip
          # List downloaded wheels for debugging
          Write-Host "Downloaded wheels:"
          $wheels = Get-ChildItem -Path wheels -Filter *.whl -Recurse
          $wheels | ForEach-Object { Write-Host "  $($_.FullName)" }
          Write-Host "Total wheels found: $($wheels.Count)"
          # Install each wheel using pip directly (bypasses uv lockfile)
          foreach ($wheel in $wheels) {
            Write-Host "Installing: $($wheel.Name)"
            uv run python -m pip install $wheel.FullName --force-reinstall --no-deps
          }
          # Verify installation
          Write-Host "Installed packages (classic*):"
          uv run python -m pip list | Select-String "classic"
        shell: pwsh

      - name: Verify Rust acceleration
        shell: bash
        run: |
          uv run python -c "import classic_yaml; print(f'Rust YAML version: {classic_yaml.__version__}')"
          uv run python -c "from ClassicLib.integration.factory import detect_component; avail = [c for c in ['classic_yaml', 'classic_scanlog', 'classic_fileio'] if detect_component(c)[0]]; print('Rust components:', avail if avail else 'none')"

      - name: Run pytest (unit tests)
        run: uv run pytest -m "unit and not slow and not stress" --maxfail=5 --tb=short --timeout=300 --skip-slow --skip-network --skip-performance --skip-stress --timeout-method=thread --junitxml=test-results/unit.xml --no-cov
        timeout-minutes: 30

      - name: Run pytest (integration tests)
        run: uv run pytest -m "integration" --maxfail=3 --tb=short --timeout=600 --timeout-method=thread --skip-slow --skip-network --skip-performance --skip-stress --junitxml=test-results/integration.xml --no-cov
        timeout-minutes: 30

      - name: Run pytest (Rust integration tests)
        run: uv run pytest tests/rust_integration/ -v --maxfail=3 --tb=short --timeout=300 --timeout-method=thread --skip-slow --skip-network --skip-performance --skip-stress --junitxml=test-results/rust-integration.xml --no-cov
        timeout-minutes: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: test-results/
          if-no-files-found: warn
          retention-days: 7
