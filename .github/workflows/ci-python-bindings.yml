name: CI - Python Bindings

on:
  push:
    branches: [main, classic-next, develop, classic-9.1]
  pull_request:
    branches: [main, classic-next, develop, classic-9.1]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  parity-gates:
    name: Python Parity Gates
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run Tier-1 Python parity and runtime coverage gate
        run: python tools/python_api_parity/check_parity_gate.py --repo-root .

      - name: Run Python stub validation gate
        run: python validate_stubs.py --rust-dir . --parity-contract docs/implementation/python_api_parity/baseline/parity_contract.json --json-out python-bindings/parity-artifacts/stub_validation_report.json --fail-on-warnings

      # Drift guard: checked-in YAML `schema_version` headers vs the
      # `client_schemas::*` constants in classic-config-core. Fails when a
      # shippable YAML file's header would be refused at load time by the
      # current client binary — i.e., the two sides of the contract drifted.
      - name: Install ruamel.yaml for drift guards
        run: python -m pip install --disable-pip-version-check "ruamel.yaml>=0.18,<0.19"

      - name: Run YAML schema-version drift guard
        run: python tools/schema_version_gate.py --repo-root .

      - name: Upload parity and runtime coverage diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: python-parity-diagnostics
          path: python-bindings/parity-artifacts/
          if-no-files-found: warn
          retention-days: 7

  build-and-test:
    name: Python Bindings Build + Smoke Tests
    needs: [parity-gates]
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: python-bindings/requirements-ci.txt

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-python-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('foundation/**/*.rs', 'business-logic/**/*.rs', 'cpp-bindings/**/*.rs', 'node-bindings/**/*.rs', 'python-bindings/**/*.rs', 'ui-applications/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-python-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-python-

      - name: Create Python bindings virtual environment
        run: uv venv python-bindings/.venv

      - name: Install Python build and test dependencies
        run: uv pip install --python python-bindings/.venv/Scripts/python.exe -r python-bindings/requirements-ci.txt

      # `maturin` is intentionally installed into `python-bindings/.venv`.
      # `rebuild_rust.ps1` targets that interpreter explicitly for Python binding builds.
      - name: Build and install required Python bindings
        shell: pwsh
        run: pwsh -ExecutionPolicy Bypass -File rebuild_rust.ps1 -Target python classic_shared classic_config classic_scanlog classic_version_registry

      - name: Run Python bindings smoke tests
        run: uv run --python python-bindings/.venv/Scripts/python.exe python -m pytest python-bindings/tests -q
