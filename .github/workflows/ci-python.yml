name: CI — Python

on:
  push:
    branches: [main, classic-next, develop, classic-9]
  pull_request:
    branches: [main, classic-next, develop, classic-9]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  PYTHON_VERSION: "3.12"
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  format:
    name: Formatting (Ruff)
    runs-on: windows-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff format check
        run: uv run ruff format --check .

  lint:
    name: Linting (Ruff)
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff check
        run: uv run ruff check .

  dead-code:
    name: Dead Code Detection (Vulture)
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run vulture dead code detection
        run: uv run vulture ClassicLib/ vulture_whitelist.py --min-confidence 80

  build-rust:
    name: Build Rust (for PyO3 bindings)
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      RUST_BACKTRACE: full
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: ClassicLib-rs/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('ClassicLib-rs/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-build-

      - name: Build all Rust workspace
        run: cargo build --workspace --release --manifest-path ClassicLib-rs/Cargo.toml

      - name: Upload Rust build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-libs
          path: |
            ClassicLib-rs/target/release/*.dll
            ClassicLib-rs/target/release/*.pdb
          retention-days: 1

  build-python-bindings:
    name: Build Python Bindings (maturin)
    runs-on: windows-latest
    needs: [build-rust]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: ClassicLib-rs/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('ClassicLib-rs/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-build-

      - name: Install maturin
        run: uv tool install maturin

      - name: Build all Python bindings
        run: ./rebuild_rust.ps1 -BuildOnly
        shell: pwsh

      - name: Upload Python binding wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels
          path: |
            ClassicLib-rs/python-bindings/*/dist/*.whl
            ClassicLib-rs/foundation/*/dist/*.whl
          retention-days: 1

  test:
    name: Tests (pytest)
    runs-on: windows-latest
    needs: [build-python-bindings]
    timeout-minutes: 30
    env:
      PYTHONTRACEMALLOC: "10"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Download Python binding wheels
        uses: actions/download-artifact@v4
        with:
          name: python-wheels
          path: wheels

      - name: Install Python dependencies and wheels
        run: |
          uv sync --all-extras
          uv pip install pip
          Write-Host "Downloaded wheels:"
          $wheels = Get-ChildItem -Path wheels -Filter *.whl -Recurse
          $wheels | ForEach-Object { Write-Host "  $($_.FullName)" }
          Write-Host "Total wheels found: $($wheels.Count)"
          foreach ($wheel in $wheels) {
            Write-Host "Installing: $($wheel.Name)"
            uv run python -m pip install $wheel.FullName --force-reinstall --no-deps
          }
          Write-Host "Installed packages (classic*):"
          uv run python -m pip list | Select-String "classic"
        shell: pwsh

      - name: Verify Rust acceleration
        shell: bash
        run: |
          uv run python -c "from ClassicLib.integration.factory import get_binding_contract, validate_rust_modules; validate_rust_modules('startup_all'); print(f\"Validated startup_all Rust bindings: {len(get_binding_contract('startup_all'))}\")"

      - name: Run phase-1 logging contract checks
        run: uv run pytest tests/parity/test_logging_contract_phase1.py -m unit --maxfail=1 --tb=short --no-cov
        timeout-minutes: 10

      - name: Run pytest (unit tests)
        run: uv run pytest -m "unit and not slow and not stress" --maxfail=5 --tb=short --timeout=300 --skip-slow --skip-network --skip-performance --skip-stress --timeout-method=thread --junitxml=test-results/unit.xml --no-cov
        timeout-minutes: 30

      - name: Run pytest (integration tests)
        run: uv run pytest -m "integration" --maxfail=3 --tb=short --timeout=600 --timeout-method=thread --skip-slow --skip-network --skip-performance --skip-stress --junitxml=test-results/integration.xml --no-cov
        timeout-minutes: 30

      - name: Run pytest (Rust integration tests)
        run: uv run pytest tests/rust_integration/ -v --maxfail=3 --tb=short --timeout=300 --timeout-method=thread --skip-slow --skip-network --skip-performance --skip-stress --junitxml=test-results/rust-integration.xml --no-cov
        timeout-minutes: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: test-results/
          if-no-files-found: warn
          retention-days: 7
