[package]
name = "classic-settings-py"
version = "9.1.0"
edition = "2024"
rust-version = "1.85"
authors = ["CLASSIC Development Team"]
description = "Python bindings for classic-settings-core"
license = "MIT"

[lib]
name = "classic_settings"
crate-type = ["cdylib", "rlib"]

[dependencies]
# PyO3 bindings
pyo3 = { workspace = true, features = ["extension-module"] }

# Async Python support
pyo3-async-runtimes = { workspace = true, features = ["tokio-runtime"] }

# Core settings cache business logic
classic-settings-core = { path = "../../business-logic/classic-settings-core" }

# Shared PyO3 helpers (PathLike, define_exceptions!, register_exceptions!, without_gil)
# — mandatory dependency after folding in classic-yaml-py (plan 01-02 D-05/D-06)
classic-shared-py = { path = "../../foundation/classic-shared-py" }

# YAML parsing (needed for validate_settings_structure to parse raw strings,
# and for the YamlOperations <-> Python conversion helpers folded in from yaml-py)
yaml-rust2 = { workspace = true }

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "deny"
unsafe_code = "deny"
missing_docs = "warn"
unused = "deny"
