[package]
name = "classic-resource-py"
version = "9.1.0"
edition = "2024"
rust-version = "1.85"
authors = ["CLASSIC Development Team"]
description = "Python bindings for classic-resource-core (PyO3)"
repository = "https://github.com/evildarkarchon/CLASSIC-Fallout4"

[lib]
crate-type = ["cdylib", "rlib"]
name = "classic_resource"

[dependencies]
# Business logic - NO PyO3 here!
classic-resource-core = { path = "../../business-logic/classic-resource-core" }

# PyO3 bindings
pyo3 = { workspace = true }

# Shared Python binding utilities
classic-shared-py = { path = "../../foundation/classic-shared-py" }

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "warn"
unsafe_code = "deny"  # We don't use unsafe in CLASSIC
missing_docs = "warn"   # Encourage documentation
unused = "deny"
