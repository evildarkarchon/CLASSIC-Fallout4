[package]
name = "classic-web-py"
version = "9.1.0"
edition = "2024"
rust-version = "1.85"
authors = ["CLASSIC Development Team"]
description = "Python bindings for classic-web-core"
repository = "https://github.com/evildarkarchon/CLASSIC-Fallout4"

[lib]
crate-type = ["cdylib", "rlib"]
name = "classic_web"

[dependencies]
# Core business logic
classic-web-core = { path = "../../business-logic/classic-web-core" }

# PyO3 for Python bindings
pyo3 = { workspace = true }

# Shared Python binding utilities
classic-shared-py = { path = "../../foundation/classic-shared-py" }

# Error handling
anyhow = { workspace = true }

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "warn"
unsafe_code = "deny"
missing_docs = "warn"
unused = "deny"
