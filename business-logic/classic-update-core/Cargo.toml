[package]
name = "classic-update-core"
version = "9.0.0"
edition = "2024"
rust-version = "1.85.0"
authors = ["CLASSIC Development Team"]
description = "Pure Rust business logic for auto-update system (NO PyO3)"
repository = "https://github.com/evildarkarchon/CLASSIC-Fallout4"

[lib]
crate-type = ["rlib"]  # Pure Rust library ONLY - NO Python bindings

[dependencies]
# CLASSIC core dependencies (pure Rust - NO PyO3!)
classic-shared-core = { path = "../../foundation/classic-shared-core" }
# Note: classic-version-core is NOT used here because GitHub releases use
# proper semver with pre-release support (e.g., 8.0.0-beta.1), while
# classic-version-core is designed for lenient game version parsing.

# YAML update delivery dependencies
classic-settings-core = { path = "../classic-settings-core" }
classic-path-core = { path = "../classic-path-core" }
classic-file-io-core = { path = "../classic-file-io-core" }

# Async runtime
tokio = { workspace = true, features = ["full"] }
futures = { workspace = true }

# HTTP client
reqwest = { workspace = true, features = ["json"] }

# Serialization for GitHub API
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Logging
log = { workspace = true }

# Environment loading
dotenvy = "0.15"

# Version comparison
semver = "1.0"

# URL parsing
url = "2.5"

[dev-dependencies]
tempfile = { workspace = true }
mockito = "1.5"  # HTTP mocking for tests
tokio = { workspace = true, features = ["full", "test-util"] }
# Integration tests in tests/yaml_update_tests.rs need direct
# classic-settings-core access to build SchemaCompat/SchemaVersion fixtures.
classic-settings-core = { path = "../classic-settings-core" }
# Integration tests use FileHasher to compute bundled-file sha256 that must
# match the mocked manifest.json for the UpToDate branch assertion.
classic-file-io-core = { path = "../classic-file-io-core" }

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "deny"
unsafe_code = "deny"  # We don't use unsafe in CLASSIC
missing_docs = "warn"   # Encourage documentation
unused = "deny"
