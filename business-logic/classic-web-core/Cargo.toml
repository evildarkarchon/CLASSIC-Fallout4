[package]
name = "classic-web-core"
version = "9.1.0"
edition = "2024"
rust-version = "1.96.0"
authors = ["CLASSIC Development Team"]
description = "Web utilities for CLASSIC (no PyO3)"
repository = "https://github.com/evildarkarchon/CLASSIC-Fallout4"

[lib]
crate-type = ["rlib"]  # Pure Rust library only - no PyO3

[dependencies]
# Shared types
classic-shared-core = { path = "../../foundation/classic-shared-core" }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# URL parsing
url = "2.5"

# Serialization
serde = { workspace = true, features = ["derive"] }

# NO PyO3 dependency!

[dev-dependencies]
serde_json = "1.0"

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "warn"
unsafe_code = "deny"
missing_docs = "warn"
unused = "deny"
