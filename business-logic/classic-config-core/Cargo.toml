[package]
name = "classic-config-core"
version = "9.1.0"
edition = "2024"
rust-version = "1.85"
authors = ["CLASSIC Development Team"]
description = "Pure Rust configuration loading business logic for CLASSIC"
repository = "https://github.com/evildarkarchon/CLASSIC-Fallout4"

[lib]
crate-type = ["rlib"] # Pure Rust library ONLY - no PyO3

[dependencies]
# CLASSIC shared utilities (provides runtime)
classic-shared-core = { path = "../../foundation/classic-shared-core" }

# Registry (provides APP_DIR override for binding scenarios)
classic-registry-core = { path = "../classic-registry-core" }

# YAML operations (provides YamlOperations with helpers)
classic-settings-core = { path = "../classic-settings-core" }
classic-version-registry-core = { path = "../classic-version-registry-core" }

# Path resolution (yaml cache directory) and atomic install / rollback
classic-path-core = { path = "../classic-path-core" }
classic-file-io-core = { path = "../classic-file-io-core" }

# Async runtime (for JoinSet and file I/O)
tokio = { workspace = true, features = ["full"] }

# YAML parsing
yaml-rust2 = { workspace = true }
hashlink = "0.11.0"               # LinkedHashMap for yaml-rust2

# Ordered collections (preserves YAML key order for Python parity)
indexmap = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
dirs = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# Logging
log = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
serial_test = "3.2"

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "warn"
unsafe_code = "deny"             # We don't use unsafe in CLASSIC
missing_docs = "warn"            # Encourage documentation
unused = "deny"
