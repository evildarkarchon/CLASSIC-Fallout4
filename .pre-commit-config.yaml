# Pre-commit hooks for CLASSIC-Fallout4
# See https://pre-commit.com for more information

repos:
  # Standard hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Python code formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Custom hooks
  - repo: local
    hooks:
      # Comprehensive test isolation checker with context awareness
      # This script understands context and avoids false positives for:
      # - Mock assertions (assert_called_with)
      # - Paths under tmp_path
      # - Files created from tmp_path fixtures
      - id: check-test-isolation
        name: Check test isolation (context-aware)
        entry: python scripts/check_test_isolation.py
        language: python
        files: ^tests/.*\.py$
        pass_filenames: true
        description: Context-aware check for test isolation violations

      # Quick check for the most obvious violation - directly modifying production settings
      - id: no-modify-production-settings
        name: No direct production settings modification
        entry: 'yaml_settings\([^)]*YAML\.Settings[^)]*new_value'
        language: pygrep
        files: ^tests/.*\.py$
        description: Detects direct modification of production settings

# Configuration for ci
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
