[package]
name = "classic-scanlog-core"
version = "9.0.0"
edition = "2024"
rust-version = "1.85.0"
authors = ["CLASSIC Development Team"]
description = "Pure Rust business logic for log parsing and analysis (NO PyO3)"
repository = "https://github.com/evildarkarchon/CLASSIC-Fallout4"

[lib]
crate-type = ["rlib"] # Pure Rust library ONLY - NO Python bindings

[features]
default = []
# Phase 16 optimization: Alternative allocator for better performance
# Enable with: cargo build --features mimalloc
mimalloc = ["dep:mimalloc"]

[dependencies]
# Alternative allocator (optional - Phase 16 optimization)
mimalloc = { workspace = true, optional = true }
# CLASSIC core dependencies (pure Rust - NO PyO3!)
classic-shared-core = { path = "../../foundation/classic-shared-core" }
classic-config-core = { path = "../classic-config-core" }
classic-file-io-core = { path = "../classic-file-io-core" }
classic-database-core = { path = "../classic-database-core" }
classic-version-registry-core = { path = "../classic-version-registry-core" }

# Parsing and pattern matching
regex = { workspace = true }
memchr = { workspace = true }
aho-corasick = { workspace = true }

# Parallel processing
rayon = { workspace = true }
crossbeam = { workspace = true }
num_cpus = { workspace = true }  # Optimization 1.8: For adaptive concurrency

# Async runtime
tokio = { workspace = true, features = ["full"] }
futures = { workspace = true }

# Caching and concurrency
quick_cache = { workspace = true }
dashmap = { workspace = true }
parking_lot = { workspace = true }
lru = { workspace = true }
linked-hash-map = { workspace = true }

# Ordered collections (preserves YAML key order for Python parity)
indexmap = { workspace = true }
rustc-hash = { workspace = true }  # Optimization 1.2: Fast hasher for FormID counting
xxhash-rust = { workspace = true } # Optimization 4.1: Fast hashing for cache keys

# String optimization
string_cache = { workspace = true }
smartstring = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Version parsing
semver = { workspace = true }

# Logging
log = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
criterion = { version = "0.6.0", features = ["html_reports"] }
sqlx = { workspace = true }
serial_test = "3.2"

[[bench]]
name = "scanlog_benchmarks"
harness = false

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "deny"
unsafe_code = "deny"             # We don't use unsafe in CLASSIC
missing_docs = "warn"            # Encourage documentation
unused = "deny"
