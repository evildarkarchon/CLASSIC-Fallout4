[package]
name = "classic-shared-core"
version = "9.0.0"
edition = "2024"
rust-version = "1.85.0"
authors = ["CLASSIC Development Team"]
description = "Pure Rust foundation utilities for CLASSIC - runtime, errors, and business logic"
repository = "https://github.com/evildarkarchon/CLASSIC-Fallout4"

[lib]
crate-type = ["rlib"] # Pure Rust library only - NO Python extension

[dependencies]
# Async runtime (ONE RUNTIME RULE)
tokio = { workspace = true }
futures = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# Performance and caching
dashmap = { workspace = true }
parking_lot = { workspace = true }
rayon = { workspace = true }

# String optimization
string_cache = { workspace = true }
smartstring = { workspace = true }
lasso = { workspace = true }

# Hashing
rustc-hash = { workspace = true }
xxhash-rust = { workspace = true }

# Logging
log = { workspace = true }

# Optional UI bridge (Slint event-loop dispatcher)
slint = { workspace = true, optional = true }
tokio-util = { workspace = true, optional = true }

[features]
# Enable AsyncBridge with Slint event-loop dispatch support
gui-bridge = ["slint", "tokio-util"]

[dev-dependencies]
criterion = { version = "0.8.1", features = ["html_reports"] }
serial_test = "3.2"
# Workaround: icu_properties (transitive via slint) requires zerovec/alloc
# when building classic-shared-core with gui-bridge in isolation.
zerovec = { version = "0.11", features = ["alloc"] }

[[bench]]
name = "string_benchmarks"
harness = false

[[bench]]
name = "path_benchmarks"
harness = false

[[bench]]
name = "performance_benchmarks"
harness = false

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "deny"
unsafe_code = "deny"             # We don't use unsafe in CLASSIC
missing_docs = "warn"            # Encourage documentation
unused = "deny"
