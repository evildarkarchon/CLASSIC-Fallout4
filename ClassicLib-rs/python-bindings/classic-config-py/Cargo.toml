[package]
name = "classic-config-py"
version = "9.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["CLASSIC Development Team"]
description = "Python bindings for classic-config-core"
repository = "https://github.com/evildarkarchon/CLASSIC-Fallout4"

[lib]
name = "classic_config"  # Python module name
crate-type = ["cdylib", "rlib"]  # Both for Python and Rust usage

[dependencies]
# Business logic (pure Rust)
classic-config-core = { path = "../../business-logic/classic-config-core" }
classic-registry-core = { path = "../../business-logic/classic-registry-core" }
classic-crashgen-settings-core = { path = "../../business-logic/classic-crashgen-settings-core" }
classic-settings-core = { path = "../../business-logic/classic-settings-core" }

# Foundation
classic-shared-core = { path = "../../foundation/classic-shared-core" }
classic-shared-py = { path = "../../foundation/classic-shared-py" }

# Python bindings
anyhow = { workspace = true }
pyo3 = { workspace = true, features = ["extension-module"] }

[dev-dependencies]
tempfile = { workspace = true }

[lints.rust]
rust_2024_compatibility = "warn"
unsafe_code = "deny"  # We don't use unsafe in CLASSIC
missing_docs = "warn"   # Encourage documentation
deprecated = "deny"
unused = "deny"
