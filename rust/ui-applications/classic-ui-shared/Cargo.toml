[package]
name = "classic-ui-shared"
version = "8.1.0"
edition = "2024"
authors = ["CLASSIC Team"]
description = "Shared UI coordination logic for CLASSIC CLI, TUI, and GUI interfaces"
license = "MIT"

[lib]
crate-type = ["rlib"]

[dependencies]
# CLASSIC core crates (business logic)
classic-shared-core = { path = "../../foundation/classic-shared-core" }
classic-yaml-core = { path = "../../business-logic/classic-yaml-core" }
classic-database-core = { path = "../../business-logic/classic-database-core" }
classic-file-io-core = { path = "../../business-logic/classic-file-io-core" }
classic-scanlog-core = { path = "../../business-logic/classic-scanlog-core" }
classic-config-core = { path = "../../business-logic/classic-config-core" }
# Note: classic-version-core is NOT used here because update_check.rs needs
# strict semver parsing for GitHub releases (with pre-release support),
# while classic-version-core is designed for lenient game version parsing.

# Async runtime (shared with core crates)
tokio = { workspace = true }
futures = { workspace = true }

# Clipboard support (cross-platform)
arboard = "3.4"

# Update checking
semver = "1.0"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }

# File system operations
notify = "7.0"
walkdir = { workspace = true }

# System directories
dirs = { workspace = true }

# Date/time for error timestamps
chrono = "0.4"

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Logging
tracing = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio-test = "0.4"

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "deny"
unsafe_code = "deny"  # We don't use unsafe in CLASSIC
missing_docs = "warn"   # Encourage documentation
unused = "deny"