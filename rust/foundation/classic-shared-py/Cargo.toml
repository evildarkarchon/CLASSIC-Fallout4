[package]
name = "classic-shared-py"
version = "8.2.0"
edition = "2024"
rust-version = "1.85.0"
authors = ["CLASSIC Development Team"]
description = "PyO3 bindings for CLASSIC shared utilities"
repository = "https://github.com/evildarkarchon/CLASSIC-Fallout4"

[lib]
name = "classic_shared"
crate-type = ["cdylib", "rlib"]  # Python extension + Rust library

[dependencies]
# Core business logic
classic-shared-core = { path = "../classic-shared-core" }

# PyO3 bindings
pyo3 = { workspace = true, features = ["extension-module"] }

# Collections with insertion order preservation
indexmap = { workspace = true }

# Logging
log = { workspace = true }

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "deny"
unsafe_code = "deny"  # We don't use unsafe in CLASSIC
missing_docs = "warn"   # Encourage documentation
unused = "deny"