[package]
name = "classic-file-io-py"
version = "8.2.0"
edition = "2024"
rust-version = "1.85.0"

[lib]
name = "classic_file_io"  # Python module name
crate-type = ["cdylib", "rlib"]  # Python extension + Rust library

[dependencies]
classic-file-io-core = { path = "../../business-logic/classic-file-io-core" }
classic-shared-core = { path = "../../foundation/classic-shared-core" }
classic-shared-py = { path = "../../foundation/classic-shared-py" }
pyo3 = { workspace = true }
pyo3-async-runtimes = { version = "0.27.0", features = ["tokio-runtime"] }
tokio = { workspace = true, features = ["fs", "io-util", "sync"] }
log = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
criterion = "0.5"

[[bench]]
name = "gil_benchmarks"
harness = false

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "warn"
unsafe_code = "forbid"  # We don't use unsafe in CLASSIC
missing_docs = "warn"   # Encourage documentation
unused = "deny"