[package]
name = "classic-message-py"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
authors = ["CLASSIC Development Team"]
description = "Python bindings for classic-message-core"
license = "MIT"

[lib]
name = "classic_message"
crate-type = ["cdylib", "rlib"]

[dependencies]
# PyO3 bindings
pyo3 = { workspace = true, features = ["extension-module"] }

# Logging
log = { workspace = true }

# Core message business logic
classic-message-core = { path = "../../business-logic/classic-message-core" }

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "deny"
unsafe_code = "deny"
missing_docs = "warn"
unused = "deny"
