[package]
name = "classic-scanlog-py"
version = "9.0.0"
edition = "2024"
rust-version = "1.85.0"
authors = ["CLASSIC Development Team"]
description = "Python bindings for classic-scanlog-core - High-performance log parsing"
repository = "https://github.com/evildarkarchon/CLASSIC-Fallout4"

[lib]
name = "classic_scanlog"
crate-type = ["cdylib", "rlib"]

[dependencies]
# PyO3 bindings
pyo3 = { workspace = true, features = ["extension-module"] }

# Core business logic (pure Rust - no PyO3)
classic-scanlog-core = { path = "../../business-logic/classic-scanlog-core" }

# CLASSIC shared utilities
classic-shared-core = { path = "../../foundation/classic-shared-core" }
classic-shared-py = { path = "../../foundation/classic-shared-py" }

# Database operations (for FormID analyzer)
classic-database-core = { path = "../../business-logic/classic-database-core" }

# Error handling (minimal for bindings)
anyhow = { workspace = true }

# Dependencies for regex patterns (needed by some wrappers)
regex = { workspace = true }
rayon = { workspace = true }

# Ordered collections (for Python dict -> IndexMap conversion)
indexmap = { workspace = true }

# Async stream processing for batch operations
futures = { workspace = true }

# CPU detection for adaptive concurrency
num_cpus = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
pyo3 = { workspace = true, features = ["extension-module", "auto-initialize"] }
criterion = "0.5"

[[bench]]
name = "gil_benchmarks"
harness = false

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "deny"
unsafe_code = "deny"  # We don't use unsafe in CLASSIC
missing_docs = "warn"   # Encourage documentation
unused = "deny"