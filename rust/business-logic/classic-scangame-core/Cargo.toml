[package]
name = "classic-scangame-core"
version = "8.2.0"
edition = "2024"
rust-version = "1.85.0"
authors = ["CLASSIC Development Team"]
description = "Pure Rust business logic for game scanning and validation (NO PyO3)"
repository = "https://github.com/evildarkarchon/CLASSIC-Fallout4"

[lib]
crate-type = ["rlib"] # Pure Rust library ONLY - NO Python bindings

[dependencies]
# CLASSIC core dependencies (pure Rust - NO PyO3!)
classic-shared-core = { path = "../../foundation/classic-shared-core" }
classic-file-io-core = { path = "../classic-file-io-core" }
classic-version-registry-core = { path = "../classic-version-registry-core" }

# Async runtime
tokio = { workspace = true, features = ["full"] }
futures = { workspace = true }

# File operations
walkdir = { workspace = true }
ddsfile = { workspace = true }
ba2 = { workspace = true }

# Configuration file processing
sha2 = { workspace = true }
strsim = { workspace = true }
configparser = { workspace = true }
toml = "0.8"

# Parsing and pattern matching
regex = { workspace = true }
memchr = { workspace = true }
aho-corasick = { workspace = true }

# Parallel processing
rayon = { workspace = true }
crossbeam = { workspace = true }
num_cpus = { workspace = true }

# Caching and concurrency
dashmap = { workspace = true }
parking_lot = { workspace = true }
once_cell = { workspace = true }
lru = { workspace = true }
rustc-hash = { workspace = true }
xxhash-rust = { workspace = true }

# String optimization
string_cache = { workspace = true }
smartstring = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Logging
log = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "deny"
unsafe_code = "deny"             # We don't use unsafe in CLASSIC
missing_docs = "warn"            # Encourage documentation
unused = "deny"
