[package]
name = "classic-web-core"
version = "8.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["CLASSIC Development Team"]
description = "Web utilities for CLASSIC (no PyO3)"
repository = "https://github.com/evildarkarchon/CLASSIC-Fallout4"

[lib]
crate-type = ["rlib"]  # Pure Rust library only - no PyO3

[dependencies]
# Constants
classic-constants-core = { path = "../classic-constants-core" }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# URL parsing
url = "2.5"

# Serialization
serde = { workspace = true, features = ["derive"] }

# NO PyO3 dependency!

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "warn"
unsafe_code = "deny"
missing_docs = "warn"
unused = "deny"
