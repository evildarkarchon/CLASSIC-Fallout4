[package]
name = "classic-config-core"
version = "8.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["CLASSIC Development Team"]
description = "Pure Rust configuration loading business logic for CLASSIC"
repository = "https://github.com/evildarkarchon/CLASSIC-Fallout4"

[lib]
crate-type = ["rlib"]  # Pure Rust library ONLY - no PyO3

[dependencies]
# CLASSIC shared utilities (provides runtime)
classic-shared-core = { path = "../../foundation/classic-shared-core" }

# YAML operations (provides YamlOperations with helpers)
classic-yaml-core = { path = "../classic-yaml-core" }

# Async runtime (for JoinSet and file I/O)
tokio = { workspace = true, features = ["full"] }

# YAML parsing
yaml-rust2 = { workspace = true }
hashlink = "0.10" # LinkedHashMap for yaml-rust2

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "warn"
unsafe_code = "deny"  # We don't use unsafe in CLASSIC
missing_docs = "warn"   # Encourage documentation
unused = "deny"