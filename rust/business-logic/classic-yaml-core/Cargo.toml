[package]
name = "classic-yaml-core"
version = "8.2.0"
edition = "2024"
rust-version = "1.85.0"
authors = ["CLASSIC Development Team"]
description = "Pure Rust YAML business logic for CLASSIC (no PyO3)"
repository = "https://github.com/evildarkarchon/CLASSIC-Fallout4"

[lib]
crate-type = ["rlib"]  # Pure Rust library only - no PyO3

[features]
default = []
dhat-heap = ["dep:dhat"]

[dependencies]
# Heap profiling (optional)
dhat = { version = "0.3", optional = true }

# Serialization for cache stats
serde = { workspace = true }

# Tracing for instrumentation
tracing = { workspace = true }
# CLASSIC shared utilities
classic-shared-core = { path = "../../foundation/classic-shared-core" }

# YAML parsing (yaml-rust2)
yaml-rust2 = { workspace = true }

# Ordered collections (preserves YAML key order)
indexmap = { workspace = true }

# Caching
dashmap = { workspace = true }
once_cell = { workspace = true }

# Error handling
thiserror = { workspace = true }

# NO PyO3 dependency!

# Note: serde_json is used by Python bindings to serialize CacheStats
serde_json = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
criterion = { version = "0.6.0", features = ["html_reports"] }
serial_test = "3.2"

[[bench]]
name = "yaml_benchmarks"
harness = false

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "deny"
unsafe_code = "deny"  # We don't use unsafe in CLASSIC
missing_docs = "warn"   # Encourage documentation
unused = "deny"