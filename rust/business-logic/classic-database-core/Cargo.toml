[package]
name = "classic-database-core"
version = "8.1.0"
edition = "2024"
rust-version = "1.85"
authors = ["CLASSIC Development Team"]
description = "Pure Rust database operations for CLASSIC (no PyO3)"
repository = "https://github.com/evildarkarchon/CLASSIC-Fallout4"

[lib]
crate-type = ["rlib"] # Pure Rust library only - no PyO3

[dependencies]
# CLASSIC shared utilities
classic-shared-core = { path = "../../foundation/classic-shared-core" }

# Database (sqlx for true async support)
sqlx = { workspace = true }

# Async runtime
tokio = { workspace = true, features = ["full"] }

# Caching and concurrency
dashmap = { workspace = true }
parking_lot = { workspace = true }
num_cpus = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Logging
log = { workspace = true }

# NO PyO3 dependency!

[dev-dependencies]
tempfile = { workspace = true }

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "warn"
unsafe_code = "deny"  # We don't use unsafe in CLASSIC
missing_docs = "warn"   # Encourage documentation
unused = "deny"