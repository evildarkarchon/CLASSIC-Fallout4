[package]
name = "classic-registry-core"
version = "9.0.0"
edition = "2024"
rust-version = "1.85"
authors = ["CLASSIC Development Team"]
description = "Core registry for global singleton management in CLASSIC"
license = "MIT"

[dependencies]
# Thread-safe concurrent data structures
dashmap = "6.1.0"

# Lazy static initialization
once_cell = "1.20.2"

# Error handling
thiserror = "2.0.9"

# Serialization (for Any type handling)
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
# Testing
tokio = { version = "1.49.0", features = ["full", "test-util"] }
serial_test = "3.2"

[lib]
crate-type = ["rlib"]

[[example]]
name = "basic_usage"
path = "examples/basic_usage.rs"

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "warn"
unsafe_code = "deny"  # We don't use unsafe in CLASSIC
missing_docs = "warn"   # Encourage documentation
unused = "deny"