[package]
name = "classic-resource-core"
version = "8.2.0"
edition = "2024"
rust-version = "1.85"
authors = ["CLASSIC Development Team"]
description = "Resource management for game files (no PyO3)"
repository = "https://github.com/evildarkarchon/CLASSIC-Fallout4"

[lib]
crate-type = ["rlib"]  # Pure Rust library only - no PyO3

[dependencies]
# Constants and utilities
classic-constants-core = { path = "../classic-constants-core" }
classic-path-core = { path = "../classic-path-core" }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# File I/O
walkdir = { workspace = true }

# BA2 archive support
ba2 = { workspace = true }

# Serialization
serde = { workspace = true, features = ["derive"] }

# NO PyO3 dependency!

[dev-dependencies]
# Testing
tempfile = { workspace = true }

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "warn"
unsafe_code = "deny"
missing_docs = "warn"
unused = "deny"
