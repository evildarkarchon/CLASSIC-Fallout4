[package]
name = "classic-version-core"
version = "8.2.0"
edition = "2024"
rust-version = "1.85"
authors = ["CLASSIC Development Team"]
description = "Version detection and parsing utilities for CLASSIC (no PyO3)"
repository = "https://github.com/evildarkarchon/CLASSIC-Fallout4"

[lib]
crate-type = ["rlib"]  # Pure Rust library only - no PyO3

[dependencies]
# Version handling
semver = "1.0"

# Parsing
regex = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# Constants access
classic-constants-core = { path = "../classic-constants-core" }

# NO PyO3 dependency!

[lints.rust]
deprecated = "deny"
rust_2024_compatibility = "warn"
unsafe_code = "deny"
missing_docs = "warn"
unused = "deny"
